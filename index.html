<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 系統</title>

<style>
body {
  font-family: Arial;
  padding:20px;
  background:#f5f6fa;
}

button {
  margin:5px;
  padding:8px 14px;
}

.card {
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<h1>📘 SOP 系統</h1>
<a href="admin.html">🛠 管理頁</a>

<div id="main"></div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

const categories = ["組立","電器","測機","整備","打樣"];

let data = {};
let currentCategory = null;

// ===== 初始化 =====
async function load() {
  const res = await fetch(API);
  data = await res.json();

  categories.forEach(c=>{
    if(!data[c]) data[c]=[];
  });

  showCategories();
}

// ===== 顯示分類 =====
function showCategories(){

  let html = "<h2>選擇分類</h2>";

  categories.forEach(c=>{
    html += `<button onclick="openCategory('${c}')">${c}</button>`;
  });

  document.getElementById("main").innerHTML = html;
}

// ===== 顯示SOP =====
function openCategory(cat){

  currentCategory = cat;

  let html = `
    <h2>📂 ${cat}</h2>
    <button onclick="showCategories()">⬅ 返回</button>
  `;

  data[cat].forEach((sop,i)=>{

    html += `
      <div class="card">
        <b>${sop.title || "未命名SOP"}</b>
        <br><br>

        <button onclick="openLearn('${cat}', ${i})">📖 閱讀</button>
      </div>
    `;
  });

  document.getElementById("main").innerHTML = html;
}

// ===== 開啟閱讀模式 =====
function openLearn(cat, i){
  location.href = `learn.html?cat=${cat}&id=${i}`;
}

// ===== 啟動 =====
load();
</script>

</body>
</html>
