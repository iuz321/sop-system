<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SOP 系統</title>
</head>
<body>

<h1>SOP 系統</h1>

<button onclick="loadData()">讀取 SOP</button>

<hr>

<h2>新增 SOP</h2>

<input id="title" placeholder="標題"><br><br>
<input id="desc" placeholder="內容"><br><br>

<button onclick="addSOP()">新增</button>

<hr>

<pre id="output"></pre>

<script>

const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

// 讀取
async function loadData() {
  const res = await fetch(API);
  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}

// 新增
async function addSOP() {
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  const res = await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ title, desc })
  });

  const result = await res.text();
  alert(result);

  loadData(); // 重新讀取
}

</script>

</body>
</html>
