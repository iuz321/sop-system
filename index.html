<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 學習</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
.step { margin:10px 0; }
img { max-width:100%; border-radius:8px; }
</style>
</head>

<body>

<h1>SOP 學習（圖片版）</h1>
<a href="admin.html">👉 管理頁</a>

<div id="list"></div>

<script>

const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

async function loadData() {
  const res = await fetch(API);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {

    const div = document.createElement("div");
    div.className = "card";

    let html = `<h2>${item.title}</h2>`;

    if (item.steps) {
      item.steps.forEach((step, i) => {
        html += `
          <div class="step">
            <b>Step ${i+1}</b>
            <p>${step.text}</p>
            ${step.img ? `<img src="${step.img}">` : ""}
          </div>
        `;
      });
    }

    div.innerHTML = html;
    list.appendChild(div);
  });
}

loadData();

</script>

</body>
</html>
