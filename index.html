<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>大量科技-生產部SOP 系統首頁</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #d0eaff, #e8f6ff);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container {
  text-align:center;
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.logo {
  width:120px;
  margin-bottom:20px;
}

h1 {
  margin-bottom:30px;
  color:#333;
}

.btn {
  display:block;
  width:260px;
  margin:15px auto;
  padding:18px;
  font-size:20px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover {
  transform:scale(1.05);
}

.edit {
  background:#3498db;
  color:white;
}

.learn {
  background:#2ecc71;
  color:white;
}
</style>

</head>

<body>

<div class="container">

  <!-- 🔽 換成你的 LOGO 路徑 -->
  <img src="LOGO.png" class="LOGO">

  <h1>大量科技-生產部-SOP 系統</h1>

  <button class="btn edit" onclick="goEdit()">
    🛠 SOP 編輯
  </button>

  <button class="btn learn" onclick="goLearn()">
    📖 SOP 學習
  </button>

</div>

<script>
function goEdit(){
  location.href = "admin.html";
}

function goLearn(){
  location.href = "learn.html";
}
</script>

</body>
</html>
