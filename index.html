<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SOP 系統</title>
</head>
<body>

<h1>SOP 系統</h1>

<button onclick="loadData()">讀取 SOP</button>

<pre id="output"></pre>

<script>
async function loadData() {
  const res = await fetch("https://raw.githubusercontent.com/iuz321/sop-system/main/data/sop.json");
  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
