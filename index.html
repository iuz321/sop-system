<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 學習</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }

.card {
  background:white;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

img { max-width:100%; }
</style>
</head>

<body>

<h1>SOP 學習系統</h1>
<a href="admin.html">👉 管理頁</a>

<input id="search" placeholder="🔍 搜尋..." oninput="render()">
<div id="categories"></div>

<div id="list"></div>

<script>

const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

let allData = [];
let currentCategory = "全部";

async function loadData() {
  const res = await fetch(API);
  allData = await res.json();

  renderCategories();
  render();
}

function renderCategories() {

  const cats = ["全部"];

  allData.forEach(item => {
    if (item.category && !cats.includes(item.category)) {
      cats.push(item.category);
    }
  });

  const div = document.getElementById("categories");
  div.innerHTML = "";

  cats.forEach(cat => {
    const btn = document.createElement("button");
    btn.innerText = cat;
    btn.onclick = () => {
      currentCategory = cat;
      render();
    };
    div.appendChild(btn);
  });
}

function render() {

  const keyword = document.getElementById("search").value.toLowerCase();

  const list = document.getElementById("list");
  list.innerHTML = "";

  allData
    .filter(item => {

      const matchKeyword =
        item.title?.toLowerCase().includes(keyword) ||
        item.steps?.some(s => s.text?.toLowerCase().includes(keyword));

      const matchCategory =
        currentCategory === "全部" ||
        item.category === currentCategory;

      return matchKeyword && matchCategory;
    })
    .forEach(item => {

      let html = `<h2>${item.title}</h2>
                  <p>📂 ${item.category || "未分類"}</p>`;

      item.steps?.forEach((step, i) => {
        html += `
          <p><b>Step ${i+1}</b></p>
          <p>${step.text}</p>
          ${step.img ? `<img src="${step.img}">` : ""}
        `;
      });

      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = html;

      list.appendChild(div);
    });
}

loadData();

</script>

</body>
</html>
