<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>大量科技-生產部SOP 系統首頁</title>

<style>
body {
  font-family: "Segoe UI", Arial;
  background: #eef3f7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

/* 主卡片 */
.container {
  text-align:center;
  background:white;
  padding:50px 60px;
  border-radius:16px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  width:360px;
}

/* LOGO */
.logo {
  width:140px;
  margin-bottom:20px;
}

/* 標題 */
h1 {
  font-size:20px;
  margin-bottom:8px;
  color:#2c3e50;
}

/* 副標 */
.subtitle {
  font-size:13px;
  color:#888;
  margin-bottom:30px;
}

/* 按鈕 */
.btn {
  display:block;
  width:100%;
  margin:12px 0;
  padding:16px;
  font-size:16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

/* 編輯 */
.edit {
  background:#2563eb;
  color:white;
}

.edit:hover {
  background:#1d4ed8;
}

/* 學習 */
.learn {
  background:#16a34a;
  color:white;
}

.learn:hover {
  background:#15803d;
}
</style>

</head>

<body>

<div class="container">

  <!-- ✅ 修正這裡（你原本錯） -->
  <img src="LOGO.png" class="logo">

  <h1>大量科技・生產部 SOP 系統</h1>

  <div class="subtitle">
    Standard Operating Procedure System
  </div>

  <button class="btn edit" onclick="goEdit()">
    🛠 SOP 編輯
  </button>

  <button class="btn learn" onclick="goLearn()">
    📘 SOP 學習
  </button>

</div>

<script>
function goEdit(){
  location.href = "admin.html";
}

function goLearn(){
  location.href = "learn.html";
}
</script>

</body>
</html>
