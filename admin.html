<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #d0eaff, #e8f6ff);
  display:flex;
  justify-content:center;
  padding:30px;
  margin:0;
}

.container {
  width:800px;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1 { text-align:center; }
.center { text-align:center; }

button {
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#e3f2ff;
}

button:hover { background:#cde7ff; }

.card {
  background:#f9fbff;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

input, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

img {
  max-width:200px;
  margin-top:10px;
  border-radius:6px;
}

.error { color:red; margin-top:10px; }
</style>

</head>

<body>
<div class="container" id="app"></div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";
const PASSWORD = "1234";
const categories = ["組立","電器","測機","整備","打樣"];

let data={}, currentCategory=null, currentIndex=null;
let newImageBase64="";

// ===== 登入 =====
function checkLogin(){
  if(localStorage.getItem("login")==="true"){ initApp(); return; }

  app.innerHTML=`
    <h1>🔐 管理登入</h1>
    <div class="center">
      <input type="password" id="pwd">
      <div id="errorMsg" class="error"></div>
      <button onclick="login()">登入</button><br><br>
      <button onclick="goHome()">🏠 返回首頁</button>
    </div>`;
}

function login(){
  if(pwd.value===PASSWORD){
    localStorage.setItem("login","true");
    initApp();
  }else{
    errorMsg.innerText="❌ 密碼錯誤";
  }
}

function logout(){ localStorage.removeItem("login"); location.reload();}
function goHome(){ location.href="index.html"; }

// ===== 主系統 =====
async function initApp(){
  app.innerHTML=`
    <h1>🛠 SOP 管理</h1>
    <div class="center">
      <a href="index.html">🏠 回首頁</a>
      <button onclick="logout()">登出</button>
    </div>
    <div id="main"></div>`;
  await load();
}

// ===== 載入 =====
async function load(){
  const res=await fetch(API);
  data=await res.json();
  categories.forEach(c=>{ if(!data[c]) data[c]=[]; });
  showCategories();
}

// ===== 分類 =====
function showCategories(){
  let html="<h2 class='center'>選擇分類</h2><div class='center'>";
  categories.forEach(c=>{
    html+=`<button onclick="openCategory('${c}')">${c}</button>`;
  });
  html+="</div>";
  main.innerHTML=html;
}

// ===== SOP列表 + 搜尋 =====
function openCategory(cat){
  currentCategory=cat;

  main.innerHTML=`
    <h2 class="center">📂 ${cat}</h2>
    <div class="center"><button onclick="showCategories()">⬅ 返回</button></div>
    <input id="searchBox" placeholder="🔍 搜尋" oninput="renderList()">
    <div id="list"></div>
    <div class="center"><button onclick="addSOP()">➕ 新增SOP</button></div>
  `;

  renderList();
}

function renderList(){
  const kw=(searchBox.value||"").toLowerCase();
  let html="";

  data[currentCategory].forEach((s,i)=>{
    if(s.title && !s.title.toLowerCase().includes(kw)) return;

    html+=`
      <div class="card">
        <b>${s.title||"未命名"}</b><br><br>
        <button onclick="openSOP(${i})">✏ 編輯</button>
        <button onclick="deleteSOP(${i})">🗑 刪除</button>
      </div>`;
  });

  list.innerHTML=html;
}

// ===== SOP =====
function addSOP(){
  data[currentCategory].push({title:"新SOP",steps:[]});
  renderList();
}

async function deleteSOP(i){
  if(!confirm("確定刪除這個SOP？")) return;
  data[currentCategory].splice(i,1);
  await saveData();
  renderList();
}

// ===== 編輯 =====
function openSOP(i){
  currentIndex=i;
  const sop=data[currentCategory][i];
  if(!sop.steps) sop.steps=[];

  let html=`
    <h2 class="center">✏ 編輯 SOP</h2>
    <div class="center">
      <button onclick="openCategory('${currentCategory}')">⬅ 返回</button>
    </div>

    <input value="${sop.title||""}" 
      onchange="data['${currentCategory}'][${i}].title=this.value">

    <hr>
  `;

  sop.steps.forEach((st,idx)=>{
    html+=`
      <div class="card">
        <input value="${st.title||""}" 
          onchange="data['${currentCategory}'][${i}].steps[${idx}].title=this.value">

        <textarea 
          onchange="data['${currentCategory}'][${i}].steps[${idx}].desc=this.value"
        >${st.desc||""}</textarea>

        <input type="file" onchange="uploadImage(event,${idx})">

        <img id="img_${idx}" src="${st.image||""}" 
          style="${st.image?'':'display:none;'}">

        <br>
        <button onclick="removeImage(${idx})">🗑 刪除圖片</button>
        <button onclick="deleteStep(${idx})">❌ 刪除步驟</button>
      </div>`;
  });

  html+=`
    <div class="card">
      <input id="newTitle" placeholder="標題">
      <textarea id="newDesc"></textarea>
      <input type="file" onchange="previewNewImage(event)">
      <img id="previewNew" style="display:none;">
      <button onclick="addStep()">新增</button>
    </div>

    <div class="center">
      <button onclick="save()">💾 儲存</button>
    </div>
  `;

  main.innerHTML=html;
}

// ===== 圖片 =====
function uploadImage(e,i){
  const f=e.target.files[0];
  if(f.size>500000){ alert("圖片<500KB"); return; }

  const r=new FileReader();
  r.onload=x=>{
    const base64=x.target.result;
    data[currentCategory][currentIndex].steps[i].image=base64;

    const img=document.getElementById("img_"+i);
    img.src=base64;
    img.style.display="block";
  };
  r.readAsDataURL(f);
}

function removeImage(i){
  if(!confirm("確定刪除圖片？")) return;

  data[currentCategory][currentIndex].steps[i].image="";
  const img=document.getElementById("img_"+i);
  img.src="";
  img.style.display="none";
}

function previewNewImage(e){
  const f=e.target.files[0];
  if(f.size>500000){ alert("圖片<500KB"); return; }

  const r=new FileReader();
  r.onload=x=>{
    newImageBase64=x.target.result;
    previewNew.src=newImageBase64;
    previewNew.style.display="block";
  };
  r.readAsDataURL(f);
}

// ===== 步驟 =====
async function deleteStep(i){
  data[currentCategory][currentIndex].steps.splice(i,1);
  await saveData();
  openSOP(currentIndex);
}

function addStep(){
  const t=newTitle.value;
  const d=newDesc.value;

  data[currentCategory][currentIndex].steps.push({
    title:t,desc:d,image:newImageBase64
  });

  newImageBase64="";
  openSOP(currentIndex);
}

// ===== 儲存 =====
async function save(){
  await saveData();
  alert("✅ 已儲存");
  openCategory(currentCategory);
}

async function saveData(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });
}

// ===== 啟動 =====
checkLogin();
</script>

</body>
</html>
