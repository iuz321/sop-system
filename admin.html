<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #d0eaff, #e8f6ff);
  display:flex;
  justify-content:center;
  padding:30px;
  margin:0;
}

.container {
  width:800px;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1 { text-align:center; }
.center { text-align:center; }

button {
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#e3f2ff;
}

button:hover { background:#cde7ff; }

.card {
  background:#f9fbff;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

input, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

img {
  max-width:200px;
  margin-top:10px;
  border-radius:6px;
}
</style>

</head>

<body>

<div class="container">
<h1>🛠 SOP 管理</h1>
<div class="center">
  <a href="index.html">🏠 回首頁</a>
</div>

<div id="main"></div>
</div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";
const categories = ["組立","電器","測機","整備","打樣"];

let data = {};
let currentCategory = null;
let currentIndex = null;
let newImageBase64 = "";

// ===== 初始化 =====
async function load(){
  const res = await fetch(API);
  data = await res.json();

  categories.forEach(c=>{
    if(!data[c]) data[c]=[];
  });

  showCategories();
}

// ===== 分類 =====
function showCategories(){
  let html = "<h2 class='center'>選擇分類</h2><div class='center'>";
  categories.forEach(c=>{
    html += `<button onclick="openCategory('${c}')">${c}</button>`;
  });
  html += "</div>";
  main.innerHTML = html;
}

// ===== SOP列表（含搜尋）=====
function openCategory(cat){
  currentCategory = cat;

  main.innerHTML = `
    <h2 class="center">📂 ${cat}</h2>
    <div class="center">
      <button onclick="showCategories()">⬅ 返回</button>
    </div>

    <input id="searchBox" placeholder="🔍 搜尋" oninput="renderList()">
    <div id="list"></div>

    <div class="center">
      <button onclick="addSOP()">➕ 新增SOP</button>
    </div>
  `;

  renderList();
}

function renderList(){
  const kw = (searchBox.value || "").toLowerCase();
  let html = "";

  data[currentCategory].forEach((s,i)=>{
    if(s.title && !s.title.toLowerCase().includes(kw)) return;

    html += `
      <div class="card">
        <b>${s.title || "未命名"}</b><br><br>
        <button onclick="openSOP(${i})">✏ 編輯</button>
        <button onclick="deleteSOP(${i})">🗑 刪除</button>
      </div>
    `;
  });

  list.innerHTML = html;
}

// ===== SOP =====
function addSOP(){
  data[currentCategory].push({title:"新SOP",steps:[]});
  renderList();
}

async function deleteSOP(i){
  if(!confirm("確定刪除？")) return;
  data[currentCategory].splice(i,1);
  await saveData();
  renderList();
}

// ===== 編輯 =====
function openSOP(i){
  currentIndex = i;
  const sop = data[currentCategory][i];
  if(!sop.steps) sop.steps = [];

  let html = `
    <h2 class="center">✏ 編輯 SOP</h2>
    <div class="center">
      <button onclick="openCategory('${currentCategory}')">⬅ 返回</button>
    </div>

    <input value="${sop.title || ""}" 
      onchange="data['${currentCategory}'][${i}].title=this.value">

    <hr>
  `;

  sop.steps.forEach((st,idx)=>{
    html += `
      <div class="card">
        <input value="${st.title || ""}" 
          onchange="data['${currentCategory}'][${i}].steps[${idx}].title=this.value">

        <textarea 
          onchange="data['${currentCategory}'][${i}].steps[${idx}].desc=this.value"
        >${st.desc || ""}</textarea>

        <input type="file" onchange="changeImage(event,${idx})">

        <img id="img_${idx}" src="${st.image || ""}" 
          style="${st.image ? '' : 'display:none;'}">

        <br>
        <button onclick="removeImage(${idx})">🗑 刪除圖片</button>
        <button onclick="deleteStep(${idx})">❌ 刪除步驟</button>
      </div>
    `;
  });

  html += `
    <div class="card">
      <input id="newTitle" placeholder="標題">
      <textarea id="newDesc"></textarea>
      <input type="file" onchange="previewNewImage(event)">
      <img id="previewNew" style="display:none;">
      <button onclick="addStep()">新增</button>
    </div>

    <div class="center">
      <button onclick="save()">💾 儲存</button>
    </div>
  `;

  main.innerHTML = html;
}

// ===== 圖片（Worker版）=====
async function changeImage(e, idx){
  const file = e.target.files[0];
  const base64 = await toBase64(file);

  const res = await fetch(API + "/upload-image", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      fileName: Date.now() + "_" + file.name,
      content: base64.split(",")[1]
    })
  });

  const json = await res.json();

  data[currentCategory][currentIndex].steps[idx].image = json.url;

  const img = document.getElementById("img_"+idx);
  img.src = json.url;
  img.style.display = "block";
}

function removeImage(idx){
  if(!confirm("確定刪除圖片？")) return;
  data[currentCategory][currentIndex].steps[idx].image = "";
  const img = document.getElementById("img_"+idx);
  img.style.display = "none";
}

// base64轉換
function toBase64(file){
  return new Promise(res=>{
    const reader = new FileReader();
    reader.onload = ()=>res(reader.result);
    reader.readAsDataURL(file);
  });
}

function previewNewImage(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(ev){
    newImageBase64 = ev.target.result;
    previewNew.src = newImageBase64;
    previewNew.style.display = "block";
  };
  reader.readAsDataURL(file);
}

// ===== 步驟 =====
function addStep(){
  data[currentCategory][currentIndex].steps.push({
    title: newTitle.value,
    desc: newDesc.value,
    image: ""
  });
  openSOP(currentIndex);
}

async function deleteStep(i){
  data[currentCategory][currentIndex].steps.splice(i,1);
  await saveData();
  openSOP(currentIndex);
}

// ===== 儲存 =====
async function save(){
  await saveData();
  alert("✅ 已儲存");
  openCategory(currentCategory);
}

async function saveData(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });
}

// ===== 啟動 =====
load();
</script>

</body>
</html>
