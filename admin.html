<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f6fa; }

button { margin:5px; padding:6px 12px; }

.card {
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
}

input, textarea {
  width:100%;
  padding:6px;
  margin:5px 0;
}
</style>

</head>

<body>

<h1>🛠 SOP 管理</h1>
<a href="index.html">🏠 回首頁</a>

<div id="main"></div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

const categories = ["組立","電器","測機","整備","打樣"];

let data = {};
let currentCategory = null;
let currentIndex = null;

// ===== 初始化 =====
async function load() {
  const res = await fetch(API);
  data = await res.json();

  categories.forEach(c=>{
    if(!data[c]) data[c]=[];
  });

  showCategories();
}

// ===== 顯示分類 =====
function showCategories() {
  currentCategory = null;
  currentIndex = null;

  let html = "<h2>選擇分類</h2>";

  categories.forEach(c=>{
    html += `<button onclick="openCategory('${c}')">${c}</button>`;
  });

  document.getElementById("main").innerHTML = html;
}

// ===== 顯示該分類的SOP =====
function openCategory(cat) {

  currentCategory = cat;

  let html = `
    <h2>📂 ${cat}</h2>
    <button onclick="showCategories()">⬅ 返回分類</button>
  `;

  data[cat].forEach((sop,i)=>{
    html += `
      <div class="card" onclick="openSOP(${i})">
        ${sop.title || "未命名SOP"}
      </div>
    `;
  });

  html += `<button onclick="addSOP()">➕ 新增SOP</button>`;

  document.getElementById("main").innerHTML = html;
}

// ===== 新增SOP =====
function addSOP() {
  data[currentCategory].push({
    title:"新SOP",
    steps:[]
  });
  openCategory(currentCategory);
}

// ===== 打開SOP編輯 =====
function openSOP(i) {

  currentIndex = i;

  const sop = data[currentCategory][i];

  if(!sop.steps) sop.steps = [];

  let html = `
    <h2>✏ 編輯 SOP</h2>
    <button onclick="openCategory('${currentCategory}')">⬅ 返回列表</button>

    <p>標題：</p>
    <input value="${sop.title || ""}" 
      onchange="data['${currentCategory}'][${i}].title=this.value">

    <br><br>
    <button onclick="save()">💾 儲存</button>

    <hr>

    <h3>📋 步驟列表</h3>
  `;

  sop.steps.forEach((step, index)=>{
    html += `
      <div class="card">
        <b>Step ${index+1}</b><br>
        ${step.title || ""}<br>
        <button onclick="editStep(${index})">✏ 編輯</button>
        <button onclick="deleteStep(${index})">❌ 刪除</button>
      </div>
    `;
  });

  html += `<button onclick="addStep()">➕ 新增步驟</button>`;

  document.getElementById("main").innerHTML = html;
}

// ===== 新增步驟 =====
function addStep() {

  const title = prompt("步驟標題");
  if(!title) return;

  const desc = prompt("步驟描述");

  const sop = data[currentCategory][currentIndex];

  sop.steps.push({
    title: title,
    desc: desc || "",
    image: ""
  });

  openSOP(currentIndex);
}

// ===== 編輯步驟 =====
function editStep(index) {

  const sop = data[currentCategory][currentIndex];
  const step = sop.steps[index];

  const title = prompt("修改標題", step.title);
  if(!title) return;

  const desc = prompt("修改描述", step.desc);

  step.title = title;
  step.desc = desc;

  openSOP(currentIndex);
}

// ===== 刪除步驟 =====
function deleteStep(index) {

  if(!confirm("確定刪除？")) return;

  const sop = data[currentCategory][currentIndex];

  sop.steps.splice(index,1);

  openSOP(currentIndex);
}

// ===== 儲存 =====
async function save() {

  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  alert("✅ 已儲存");

  openCategory(currentCategory);
}

// ===== 啟動 =====
load();
</script>

</body>
</html>
