<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #d0eaff, #e8f6ff);
  display:flex;
  justify-content:center;
  padding:30px;
}

.container {
  width:800px;
  background:white;
  padding:30px;
  border-radius:20px;
}

.card {
  background:#f9fbff;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

button { margin:5px; }
img { max-width:200px; }
</style>

</head>

<body>

<div class="container">
<h1>🛠 SOP 管理</h1>
<div id="main"></div>
</div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";
const categories = ["組立","電器","測機","整備","打樣"];

let data={}, currentCategory=null, currentIndex=null;

// ===== 載入 =====
async function load(){
  const res = await fetch(API);
  data = await res.json();
  showCategories();
}

// ===== 分類 =====
function showCategories(){
  let html="";
  categories.forEach(c=>{
    html+=`<button onclick="openCategory('${c}')">${c}</button>`;
  });
  main.innerHTML=html;
}

// ===== SOP列表 =====
function openCategory(cat){
  currentCategory=cat;

  let html=`<h2>${cat}</h2>`;

  data[cat].forEach((s,i)=>{
    html+=`
      <div class="card">
        ${s.title}
        <br>
        <button onclick="openSOP(${i})">編輯</button>
      </div>
    `;
  });

  html+=`<button onclick="addSOP()">新增</button>`;

  main.innerHTML=html;
}

function addSOP(){
  data[currentCategory].push({title:"新SOP",steps:[]});
  openCategory(currentCategory);
}

// ===== 編輯 =====
function openSOP(i){
  currentIndex=i;
  const sop=data[currentCategory][i];

  let html=`
  <button onclick="openCategory('${currentCategory}')">返回</button>

  <input value="${sop.title}"
    onchange="data['${currentCategory}'][${i}].title=this.value">
  <hr>
  `;

  sop.steps.forEach((st,idx)=>{
    html+=`
      <div class="card">

        <input value="${st.title||""}"
          onchange="data['${currentCategory}'][${i}].steps[${idx}].title=this.value">

        <textarea
          onchange="data['${currentCategory}'][${i}].steps[${idx}].desc=this.value"
        >${st.desc||""}</textarea>

        <input type="file" onchange="uploadImage(event,${idx})">

        <img src="${st.image||""}" id="img_${idx}">

        <br>
        <button onclick="removeImage(${idx})">刪圖片</button>
        <button onclick="deleteStep(${idx})">刪步驟</button>

      </div>
    `;
  });

  html+=`
    <button onclick="addStep()">新增步驟</button>
    <br><br>
    <button onclick="save()">💾 儲存</button>
  `;

  main.innerHTML=html;
}

// ===== 圖片 =====
async function uploadImage(e,idx){
  const file=e.target.files[0];
  const base64=await toBase64(file);

  const res=await fetch(API+"/upload-image",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      fileName:Date.now()+"_"+file.name,
      content:base64.split(",")[1]
    })
  });

  const json=await res.json();

  data[currentCategory][currentIndex].steps[idx].image=json.url;
  document.getElementById("img_"+idx).src=json.url;
}

function removeImage(idx){
  data[currentCategory][currentIndex].steps[idx].image="";
  document.getElementById("img_"+idx).src="";
}

function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

// ===== 步驟 =====
function addStep(){
  data[currentCategory][currentIndex].steps.push({title:"步驟",desc:""});
  openSOP(currentIndex);
}

function deleteStep(i){
  data[currentCategory][currentIndex].steps.splice(i,1);
  openSOP(currentIndex);
}

// ===== 儲存 =====
async function save(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  alert("✅ 已儲存");
  openCategory(currentCategory);
}

// ===== 啟動 =====
load();
</script>

</body>
</html>
