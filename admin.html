<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body {
  font-family: Arial;
  background: #d6e6f2;
  display:flex;
  justify-content:center;
}

.container {
  width: 900px;
  background:white;
  padding:20px;
  border-radius:15px;
  margin-top:40px;
}

.step {
  border:1px solid #ccc;
  padding:10px;
  margin-bottom:10px;
  border-radius:10px;
}

img {
  max-width:200px;
  margin-top:10px;
}

button {
  margin:5px;
}
</style>

</head>

<body>

<div class="container">

<h1>🛠 SOP 管理</h1>

<div id="main"></div>

</div>

<script>

const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

let data = {};
let currentCategory = null;
let currentIndex = null;

// ===== 載入 =====
async function load(){
  const res = await fetch(API);
  data = await res.json();

  if(!data["測機"]) data["測機"] = [];

  showList();
}

// ===== 列表 =====
function showList(){

  let html = "<h2>測機</h2>";

  data["測機"].forEach((sop,i)=>{
    html += `
      <div>
        ${sop.title}
        <button onclick="edit(${i})">編輯</button>
      </div>
    `;
  });

  html += `<button onclick="add()">➕ 新增</button>`;

  document.getElementById("main").innerHTML = html;
}

// ===== 新增 =====
function add(){
  data["測機"].push({
    title:"新SOP",
    steps:[]
  });
  showList();
}

// ===== 編輯 =====
function edit(i){

  currentIndex = i;
  const sop = data["測機"][i];

  let html = `
    <h2>編輯</h2>

    標題：
    <input value="${sop.title}"
      onchange="data['測機'][${i}].title=this.value">
  `;

  sop.steps.forEach((s,idx)=>{
    html += renderStep(s, idx);
  });

  html += `
    <button onclick="addStep()">➕ 步驟</button>
    <br><br>
    <button onclick="save()">💾 儲存</button>
    <button onclick="showList()">⬅ 返回</button>
  `;

  document.getElementById("main").innerHTML = html;
}

// ===== 渲染步驟 =====
function renderStep(s, idx){

  return `
  <div class="step">

    步驟名稱：
    <input value="${s.title || ""}"
      onchange="data['測機'][${currentIndex}].steps[${idx}].title=this.value">

    說明：
    <input value="${s.desc || ""}"
      onchange="data['測機'][${currentIndex}].steps[${idx}].desc=this.value">

    <br>

    <!-- 上傳圖片 -->
    <input type="file" accept="image/*"
      onchange="uploadImage(event, ${idx})">

    <br>

    ${s.image ? `<img src="${s.image}">` : ""}

    <br>

    ${s.image ? `
      <button onclick="removeImage(${idx})">❌ 刪除圖片</button>
    ` : ""}

    <button onclick="deleteStep(${idx})">🗑 刪除步驟</button>

  </div>
  `;
}

// ===== 新增步驟 =====
function addStep(){
  data["測機"][currentIndex].steps.push({});
  edit(currentIndex);
}

// ===== 刪除步驟 =====
function deleteStep(i){
  data["測機"][currentIndex].steps.splice(i,1);
  edit(currentIndex);
}

// ===== ❗圖片上傳（核心）=====
async function uploadImage(e, idx){

  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = async function(ev){

    const base64 = ev.target.result.split(",")[1];

    // 上傳到 GitHub
    const res = await fetch(API + "/upload-image",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        fileName: Date.now() + ".jpg",
        content: base64
      })
    });

    const json = await res.json();

    // ✅ 存網址（不是 base64）
    data["測機"][currentIndex].steps[idx].image = json.url;

    edit(currentIndex);
  };

  reader.readAsDataURL(file);
}

// ===== 刪除圖片 =====
function removeImage(idx){
  data["測機"][currentIndex].steps[idx].image = "";
  edit(currentIndex);
}

// ===== 儲存 =====
async function save(){

  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data)
  });

  alert("✅ 已儲存");
  showList();
}

// ===== 啟動 =====
load();

</script>

</body>
</html>
