<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
.step { border:1px dashed #ccc; padding:10px; margin:5px 0; }
input { width:100%; padding:8px; margin:5px 0; }
</style>
</head>

<body>

<h1>SOP 管理</h1>
<a href="index.html">👉 學習頁</a>

<div class="card">
  <input id="title" placeholder="SOP名稱">
  <input id="category" placeholder="分類（設備/製程）">
  <div id="steps"></div>
  <button onclick="addStep()">＋步驟</button>
  <button onclick="addSOP()">儲存</button>
</div>

<div id="list"></div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

function addStep() {
  const div = document.createElement("div");
  div.className = "step";

  div.innerHTML = `
    <input placeholder="步驟說明">
    <input class="imgUrl" placeholder="圖片URL">
    <input type="file" onchange="uploadImage(this)">
  `;

  document.getElementById("steps").appendChild(div);
}

async function uploadImage(input) {
  const file = input.files[0];
  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch(API + "/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();
  input.parentElement.querySelector(".imgUrl").value = data.url;
}

async function addSOP() {

  const title = document.getElementById("title").value;
  const category = document.getElementById("category").value;

  const stepDivs = document.querySelectorAll(".step");
  const steps = [];

  stepDivs.forEach(div => {
    const inputs = div.querySelectorAll("input");
    steps.push({
      text: inputs[0].value,
      img: inputs[1].value
    });
  });

  await fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ title, category, steps })
  });

  location.reload();
}

async function loadData() {
  const res = await fetch(API);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${item.title} (${item.category || "未分類"})</h3>
      <button onclick="deleteSOP(${index})">刪除</button>
    `;

    list.appendChild(div);
  });
}

async function deleteSOP(index) {
  const res = await fetch(API);
  let data = await res.json();

  data.splice(index, 1);

  await fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ __replace: data })
  });

  loadData();
}

loadData();
</script>

</body>
</html>
