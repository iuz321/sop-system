<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f6fa; }

.topbar {
  margin-bottom: 20px;
}

button {
  margin: 5px;
  padding: 6px 12px;
}

.card {
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

input {
  width:100%;
  padding:6px;
  margin:5px 0;
}
</style>

</head>

<body>

<h1>🛠 SOP 管理</h1>
<a href="index.html">🏠 回首頁</a>

<div class="topbar" id="categoryBar"></div>

<h2 id="currentTitle"></h2>

<div id="list"></div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

// 固定分類
const categories = ["組立","電器","測機","整備","打樣"];

let data = {};
let current = null;

// ===== 初始化 =====
async function load() {
  const res = await fetch(API);
  data = await res.json();

  // 確保分類存在
  categories.forEach(c=>{
    if(!data[c]) data[c] = [];
  });

  renderCategories();
}

// ===== 顯示分類 =====
function renderCategories() {
  const div = document.getElementById("categoryBar");
  div.innerHTML = "";

  categories.forEach(c=>{
    const btn = document.createElement("button");
    btn.innerText = c;
    btn.onclick = () => {
      current = c;
      renderList();
    };
    div.appendChild(btn);
  });
}

// ===== 顯示該分類 =====
function renderList() {

  document.getElementById("currentTitle").innerText = "📂 " + current;

  const div = document.getElementById("list");
  div.innerHTML = "";

  data[current].forEach((sop, i)=>{

    div.innerHTML += `
      <div class="card">
        <input value="${sop.title||""}" 
          onchange="data['${current}'][${i}].title=this.value">

        <button onclick="deleteSOP(${i})">🗑 刪除</button>
      </div>
    `;
  });

  // ⭐ 新增按鈕（只在分類內）
  div.innerHTML += `
    <button onclick="addSOP()">➕ 新增 SOP</button>
    <button onclick="save()">💾 儲存</button>
  `;
}

// ===== CRUD =====
function addSOP() {
  if(!current) return alert("請先選分類");

  data[current].push({
    title: "新SOP",
    steps: []
  });

  renderList();
}

function deleteSOP(i) {
  data[current].splice(i,1);
  renderList();
}

// ===== 儲存 =====
async function save() {

  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  alert("✅ 已儲存");
}

// ===== 啟動 =====
load();
</script>

</body>
</html>
