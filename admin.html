<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f6fa; }

button { margin:5px; padding:6px 12px; }

.card {
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  cursor:pointer;
}

input {
  width:100%;
  padding:6px;
  margin:5px 0;
}
</style>

</head>

<body>

<h1>🛠 SOP 管理</h1>
<a href="index.html">🏠 回首頁</a>

<div id="main"></div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

const categories = ["組立","電器","測機","整備","打樣"];

let data = {};
let currentCategory = null;
let currentIndex = null;

// ===== 初始化 =====
async function load() {
  const res = await fetch(API);
  data = await res.json();

  categories.forEach(c=>{
    if(!data[c]) data[c]=[];
  });

  showCategories();
}

// ===== 顯示分類 =====
function showCategories() {
  currentCategory = null;
  currentIndex = null;

  let html = "<h2>選擇分類</h2>";

  categories.forEach(c=>{
    html += `<button onclick="openCategory('${c}')">${c}</button>`;
  });

  document.getElementById("main").innerHTML = html;
}

// ===== 顯示該分類的SOP =====
function openCategory(cat) {

  currentCategory = cat;

  let html = `
    <h2>📂 ${cat}</h2>
    <button onclick="showCategories()">⬅ 返回分類</button>
  `;

  data[cat].forEach((sop,i)=>{
    html += `
      <div class="card" onclick="openSOP(${i})">
        ${sop.title || "未命名SOP"}
      </div>
    `;
  });

  html += `<button onclick="addSOP()">➕ 新增SOP</button>`;

  document.getElementById("main").innerHTML = html;
}

// ===== 新增SOP =====
function addSOP() {
  data[currentCategory].push({
    title:"新SOP",
    steps:[]
  });
  openCategory(currentCategory);
}

// ===== 打開SOP編輯 =====
function openSOP(i) {

  currentIndex = i;

  const sop = data[currentCategory][i];

  let html = `
    <h2>✏ 編輯 SOP</h2>
    <button onclick="openCategory('${currentCategory}')">⬅ 返回列表</button>

    <p>標題：</p>
    <input value="${sop.title || ""}" 
      onchange="data['${currentCategory}'][${i}].title=this.value">

    <br><br>
    <button onclick="save()">💾 儲存</button>
  `;

  document.getElementById("main").innerHTML = html;
}

// ===== 儲存 =====
async function save() {

  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  alert("✅ 已儲存");

  openCategory(currentCategory);
}

// ===== 啟動 =====
load();
</script>

</body>
</html>
