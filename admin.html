<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #d0eaff, #e8f6ff);
  display:flex;
  justify-content:center;
  padding:30px;
  margin:0;
}

.container {
  width:800px;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1 { text-align:center; }
.center { text-align:center; }

button {
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#e3f2ff;
}

button:hover { background:#cde7ff; }

.card {
  background:#f9fbff;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

input, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

img {
  max-width:200px;
  margin-top:10px;
  border-radius:6px;
}

.error {
  color:red;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="container" id="app"></div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";
const PASSWORD = "1234";

const categories = ["組立","電器","測機","整備","打樣"];

let data = {};
let currentCategory = null;
let currentIndex = null;

// ===== 登入 =====
function checkLogin(){
  if(localStorage.getItem("login")==="true"){ initApp(); return; }

  document.getElementById("app").innerHTML = `
    <h1>🔐 管理登入</h1>
    <div class="center">
      <input type="password" id="pwd">
      <div id="errorMsg" class="error"></div>
      <button onclick="login()">登入</button><br><br>
      <button onclick="goHome()">🏠 返回首頁</button>
    </div>
  `;
}

function login(){
  const val=document.getElementById("pwd").value;
  if(val===PASSWORD){
    localStorage.setItem("login","true");
    initApp();
  }else{
    document.getElementById("errorMsg").innerText="❌ 密碼錯誤";
  }
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

function goHome(){
  location.href="index.html";
}

// ===== 主系統 =====
async function initApp(){
  document.getElementById("app").innerHTML = `
    <h1>🛠 SOP 管理</h1>
    <div class="center">
      <a href="index.html">🏠 回首頁</a>
      <button onclick="logout()">登出</button>
    </div>
    <div id="main"></div>
  `;
  await load();
}

// ===== 載入 =====
async function load(){
  const res=await fetch(API);
  data=await res.json();

  categories.forEach(c=>{
    if(!data[c]) data[c]=[];
  });

  showCategories();
}

// ===== 分類 =====
function showCategories(){
  let html="<h2 class='center'>選擇分類</h2><div class='center'>";
  categories.forEach(c=>{
    html+=`<button onclick="openCategory('${c}')">${c}</button>`;
  });
  html+="</div>";
  document.getElementById("main").innerHTML=html;
}

// ===== SOP列表（含搜尋）=====
function openCategory(cat){

  currentCategory=cat;

  let html=`
    <h2 class="center">📂 ${cat}</h2>

    <div class="center">
      <button onclick="showCategories()">⬅ 返回分類</button>
    </div>

    <input id="searchBox" placeholder="🔍 搜尋SOP"
      oninput="renderSOPList()">
  `;

  html += `<div id="sopList"></div>`;

  html += `<div class="center">
    <button onclick="addSOP()">➕ 新增SOP</button>
  </div>`;

  document.getElementById("main").innerHTML=html;

  renderSOPList();
}

// ===== SOP渲染（搜尋）=====
function renderSOPList(){

  const keyword=document.getElementById("searchBox").value.toLowerCase();
  let html="";

  data[currentCategory].forEach((sop,i)=>{

    if(sop.title && !sop.title.toLowerCase().includes(keyword)) return;

    html+=`
      <div class="card">
        <b>${sop.title||"未命名SOP"}</b><br><br>
        <button onclick="openSOP(${i})">✏ 編輯</button>
        <button onclick="deleteSOP(${i})">🗑 刪除</button>
      </div>
    `;
  });

  document.getElementById("sopList").innerHTML=html;
}

// ===== SOP操作 =====
function addSOP(){
  data[currentCategory].push({title:"新SOP",steps:[]});
  renderSOPList();
}

// 🔥 刪除後自動儲存
async function deleteSOP(i){
  if(!confirm("確定刪除這個SOP？")) return;

  data[currentCategory].splice(i,1);
  await saveData();
  renderSOPList();
}

// ===== 編輯 =====
function openSOP(i){
  currentIndex=i;
  const sop=data[currentCategory][i];
  if(!sop.steps) sop.steps=[];

  let html=`
    <h2 class="center">✏ 編輯 SOP</h2>
    <div class="center">
      <button onclick="openCategory('${currentCategory}')">⬅ 返回</button>
    </div>

    <input value="${sop.title||""}" 
      onchange="data['${currentCategory}'][${i}].title=this.value">

    <hr><h3>步驟</h3>
  `;

  sop.steps.forEach((s,index)=>{
    html+=`
      <div class="card">
        <input value="${s.title||""}" 
          onchange="data['${currentCategory}'][${i}].steps[${index}].title=this.value">

        <textarea 
          onchange="data['${currentCategory}'][${i}].steps[${index}].desc=this.value"
        >${s.desc||""}</textarea>

        <button onclick="deleteStep(${index})">❌</button>
      </div>
    `;
  });

  html+=`
    <div class="card">
      <input id="newTitle">
      <textarea id="newDesc"></textarea>
      <button onclick="addStep()">新增</button>
    </div>

    <div class="center">
      <button onclick="save()">💾 儲存</button>
    </div>
  `;

  document.getElementById("main").innerHTML=html;
}

// ===== 步驟 =====
async function deleteStep(i){
  data[currentCategory][currentIndex].steps.splice(i,1);
  await saveData(); // 🔥 自動儲存
  openSOP(currentIndex);
}

function addStep(){
  const t=document.getElementById("newTitle").value;
  const d=document.getElementById("newDesc").value;

  data[currentCategory][currentIndex].steps.push({title:t,desc:d});
  openSOP(currentIndex);
}

// ===== 儲存 =====
async function save(){
  await saveData();
  alert("✅ 已儲存");
  openCategory(currentCategory);
}

async function saveData(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });
}

// ===== 啟動 =====
checkLogin();
</script>

</body>
</html>
