<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
input { width:100%; padding:8px; margin:5px 0; }
button { margin:5px; }
.step { border:1px dashed #ccc; padding:10px; margin:5px 0; }
</style>
</head>

<body>

<h1>SOP 管理（圖片版）</h1>
<a href="index.html">👉 回學習頁</a>

<div class="card">
  <h3>新增 SOP</h3>
  <input id="title" placeholder="SOP名稱">
  <div id="steps"></div>
  <button onclick="addStep()">＋新增步驟</button>
  <button onclick="addSOP()">儲存SOP</button>
</div>

<div id="list"></div>

<script>

const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

// 新增步驟UI
function addStep() {
  const div = document.createElement("div");
  div.className = "step";

  div.innerHTML = `
    <input placeholder="步驟說明">
    <input placeholder="圖片URL">
  `;

  document.getElementById("steps").appendChild(div);
}

// 新增SOP
async function addSOP() {

  const title = document.getElementById("title").value;
  const stepDivs = document.querySelectorAll("#steps .step");

  const steps = [];

  stepDivs.forEach(div => {
    const inputs = div.querySelectorAll("input");
    steps.push({
      text: inputs[0].value,
      img: inputs[1].value
    });
  });

  await fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ title, steps })
  });

  location.reload();
}

// 載入
async function loadData() {
  const res = await fetch(API);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((item, index) => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${item.title}</h3>
      <button onclick="deleteSOP(${index})">刪除</button>
    `;

    list.appendChild(div);
  });
}

// 刪除
async function deleteSOP(index) {

  const res = await fetch(API);
  let data = await res.json();

  data.splice(index, 1);

  await fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ __replace: data })
  });

  loadData();
}

loadData();

</script>

</body>
</html>
