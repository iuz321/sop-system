<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body { font-family: Arial; background:#f5f6fa; padding:20px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
.step { border:1px dashed #ccc; padding:10px; margin-top:10px; }
input { width:100%; padding:8px; margin:5px 0; }
button { margin-top:5px; padding:6px 12px; }
img { max-width:200px; display:block; margin-top:5px; }
</style>
</head>

<body>

<h1>🛠 SOP 管理</h1>
<a href="index.html">👉 回首頁</a>

<div id="list"></div>
<button onclick="addSOP()">➕ 新增 SOP</button>
<br><br>
<button onclick="save()">💾 儲存</button>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";
let sopData = [];

async function load() {
  const res = await fetch(API);
  sopData = await res.json();
  render();
}

function render() {
  const div = document.getElementById("list");
  div.innerHTML = "";

  sopData.forEach((sop, i) => {

    let html = `
    <div class="card">
      <input value="${sop.title || ""}" onchange="sopData[${i}].title=this.value">
      <input value="${sop.category || ""}" placeholder="分類" onchange="sopData[${i}].category=this.value">
    `;

    sop.steps = sop.steps || [];

    sop.steps.forEach((step, j) => {
      html += `
        <div class="step">
          <input value="${step.text || ""}" onchange="sopData[${i}].steps[${j}].text=this.value">
          
          <input class="imgUrl" value="${step.image || ""}" placeholder="圖片URL">

          <input type="file" onchange="uploadImage(this)">

          ${step.image ? `<img src="${step.image}">` : ""}

          <button onclick="deleteStep(${i},${j})">刪除</button>
        </div>
      `;
    });

    html += `
      <button onclick="addStep(${i})">➕ 步驟</button>
      <button onclick="deleteSOP(${i})">🗑 刪除</button>
    </div>
    `;

    div.innerHTML += html;
  });
}

// ===== CRUD =====
function addSOP() {
  sopData.push({ title:"新SOP", category:"", steps:[] });
  render();
}

function deleteSOP(i) {
  sopData.splice(i,1);
  render();
}

function addStep(i) {
  sopData[i].steps.push({ text:"", image:"" });
  render();
}

function deleteStep(i,j) {
  sopData[i].steps.splice(j,1);
  render();
}

// ===== 上傳圖片（已修正🔥）=====
async function uploadImage(input) {

  const file = input.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(API + "/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    const stepDiv = input.parentElement;
    const card = input.closest(".card");

    const i = Array.from(document.querySelectorAll(".card")).indexOf(card);
    const j = Array.from(card.querySelectorAll(".step")).indexOf(stepDiv);

    // ⭐⭐ 直接寫資料（關鍵）
    sopData[i].steps[j].image = data.url;

    // 更新 UI
    stepDiv.querySelector(".imgUrl").value = data.url;

    let img = stepDiv.querySelector("img");
    if (!img) {
      img = document.createElement("img");
      stepDiv.appendChild(img);
    }
    img.src = data.url;

    alert("✅ 上傳成功");

  } catch (err) {
    alert("❌ 上傳失敗：" + err.message);
  }
}

// ===== 儲存 =====
async function save() {

  await fetch(API, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(sopData)
  });

  alert("✅ 已儲存");
}

load();
</script>

</body>
</html>
