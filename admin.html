<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>
<h1>SOP 管理</h1>
<a href="index.html" style="display:inline-block;margin-bottom:15px;">🏠 回首頁</a>  
</head>

<body>

<h1>SOP 管理</h1>

<div id="cats"></div>
<div id="list"></div>

<button onclick="save()">儲存</button>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

const categories = ["組立","電器","測機","整備","打樣"];

let data = {};
let current = "組立";

async function load() {
  const res = await fetch(API);
  data = await res.json();

  categories.forEach(c=>{
    if(!data[c]) data[c]=[];
  });

  renderCats();
  render();
}

function renderCats() {
  const div = document.getElementById("cats");

  categories.forEach(c=>{
    const b = document.createElement("button");
    b.innerText = c;
    b.onclick=()=>{
      current=c;
      render();
    };
    div.appendChild(b);
  });
}

function render() {
  const div = document.getElementById("list");
  div.innerHTML="";

  data[current].forEach((sop,i)=>{
    div.innerHTML += `
      <div>
        <input value="${sop.title||""}" 
          onchange="data['${current}'][${i}].title=this.value">
        <button onclick="del(${i})">刪除</button>
      </div>
    `;
  });

  div.innerHTML += `<button onclick="add()">新增</button>`;
}

function add(){
  data[current].push({title:"新SOP",steps:[]});
  render();
}

function del(i){
  data[current].splice(i,1);
  render();
}

async function save(){
  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify(data)
  });

  alert("已存檔");
}

load();
</script>

</body>
</html>
