<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f6fa; }
button { margin:5px; padding:6px 12px; }

.card {
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

input, textarea {
  width:100%;
  padding:6px;
  margin:5px 0;
}
img { max-width:200px; margin-top:10px; }
</style>
</head>

<body>

<h1>🛠 SOP 管理</h1>
<a href="index.html">🏠 回首頁</a>

<div id="main"></div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";
const categories = ["組立","電器","測機","整備","打樣"];

let data = {};
let currentCategory = null;
let currentIndex = null;

// ===== 初始化 =====
async function load() {
  const res = await fetch(API);
  data = await res.json();

  categories.forEach(c=>{
    if(!data[c]) data[c]=[];
  });

  showCategories();
}

// ===== 分類 =====
function showCategories() {
  let html = "<h2>選擇分類</h2>";

  categories.forEach(c=>{
    html += `<button onclick="openCategory('${c}')">${c}</button>`;
  });

  document.getElementById("main").innerHTML = html;
}

// ===== SOP列表 =====
function openCategory(cat) {
  currentCategory = cat;

  let html = `<h2>${cat}</h2>
    <button onclick="showCategories()">⬅ 返回</button>
  `;

  data[cat].forEach((sop,i)=>{
    html += `
      <div class="card">
        ${sop.title || "未命名"}
        <br>
        <button onclick="openSOP(${i})">編輯</button>
        <button onclick="deleteSOP(${i})">刪除</button>
      </div>
    `;
  });

  html += `<button onclick="addSOP()">➕ 新增SOP</button>`;

  document.getElementById("main").innerHTML = html;
}

// ===== SOP操作 =====
function addSOP() {
  data[currentCategory].push({title:"新SOP",steps:[]});
  openCategory(currentCategory);
}

function deleteSOP(i){
  if(!confirm("確定刪除？")) return;
  data[currentCategory].splice(i,1);
  openCategory(currentCategory);
}

// ===== 編輯 =====
function openSOP(i) {
  currentIndex = i;
  const sop = data[currentCategory][i];
  if(!sop.steps) sop.steps=[];

  let html = `
    <h2>編輯 SOP</h2>
    <button onclick="openCategory('${currentCategory}')">⬅ 返回</button>

    <input value="${sop.title||""}" 
      onchange="data['${currentCategory}'][${i}].title=this.value">

    <hr>
  `;

  sop.steps.forEach((st,idx)=>{
    html += `
      <div class="card">

        <input value="${st.title||""}" 
          onchange="data['${currentCategory}'][${i}].steps[${idx}].title=this.value">

        <textarea
          onchange="data['${currentCategory}'][${i}].steps[${idx}].desc=this.value"
        >${st.desc||""}</textarea>

        <input type="file" onchange="uploadImage(event,${idx})">

        <img id="img_${idx}" src="${st.image||""}">

        <br>
        <button onclick="removeImage(${idx})">刪圖片</button>
        <button onclick="deleteStep(${idx})">刪步驟</button>
      </div>
    `;
  });

  html += `
    <button onclick="addStep()">新增步驟</button>
    <br><br>
    <button onclick="save()">💾 儲存</button>
  `;

  document.getElementById("main").innerHTML = html;
}

// ===== 圖片（走Worker）=====
async function uploadImage(e, idx){
  const file = e.target.files[0];
  const base64 = await toBase64(file);

  const res = await fetch(API + "/upload-image", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      fileName: Date.now()+"_"+file.name,
      content: base64.split(",")[1]
    })
  });

  const json = await res.json();

  data[currentCategory][currentIndex].steps[idx].image = json.url;
  document.getElementById("img_"+idx).src = json.url;
}

function removeImage(idx){
  data[currentCategory][currentIndex].steps[idx].image="";
  document.getElementById("img_"+idx).src="";
}

function toBase64(file){
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.readAsDataURL(file);
  });
}

// ===== 步驟 =====
function addStep(){
  data[currentCategory][currentIndex].steps.push({title:"步驟",desc:""});
  openSOP(currentIndex);
}

function deleteStep(i){
  data[currentCategory][currentIndex].steps.splice(i,1);
  openSOP(currentIndex);
}

// ===== 儲存 =====
async function save(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  alert("已儲存");
  openCategory(currentCategory);
}

// ===== 啟動 =====
load();
</script>

</body>
</html>
