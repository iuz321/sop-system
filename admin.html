<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body { font-family: Arial; background:#f5f6fa; padding:20px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
.step { border:1px dashed #ccc; padding:10px; margin-top:10px; }
button { margin:5px; }
</style>
</head>

<body>

<h1>🛠 SOP 管理</h1>
<a href="index.html">👉 回首頁</a>

<!-- 分類 -->
<div id="categoryBar"></div>

<!-- SOP列表 -->
<div id="list"></div>

<button onclick="addSOP()">➕ 新增 SOP</button>
<button onclick="save()">💾 儲存</button>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

// ⭐ 預設分類
const categories = ["組立","電器","測機","整備","打樣"];

let sopData = [];
let currentCategory = "組立";

// ===== 載入 =====
async function load() {
  const res = await fetch(API);
  sopData = await res.json();

  renderCategories();
  render();
}

// ===== 分類按鈕 =====
function renderCategories() {

  const div = document.getElementById("categoryBar");
  div.innerHTML = "";

  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.innerText = cat;
    btn.onclick = () => {
      currentCategory = cat;
      render();
    };
    div.appendChild(btn);
  });
}

// ===== 畫面 =====
function render() {

  const div = document.getElementById("list");
  div.innerHTML = "";

  sopData
    .filter(s => (s.category || "組立") === currentCategory)
    .forEach((sop, i) => {

      const realIndex = sopData.indexOf(sop);

      let html = `
      <div class="card">
        <input value="${sop.title || ""}" 
          onchange="sopData[${realIndex}].title=this.value">

        <p>📂 ${currentCategory}</p>
      `;

      sop.steps = sop.steps || [];

      sop.steps.forEach((step, j) => {
        html += `
          <div class="step">
            <input value="${step.text || ""}" 
              onchange="sopData[${realIndex}].steps[${j}].text=this.value">

            ${step.image ? `<img src="${step.image}" width="150">` : ""}

            <button onclick="deleteStep(${realIndex},${j})">刪除步驟</button>
          </div>
        `;
      });

      html += `
        <button onclick="addStep(${realIndex})">➕ 步驟</button>
        <button onclick="deleteSOP(${realIndex})">🗑 刪除</button>
      </div>
      `;

      div.innerHTML += html;
    });
}

// ===== CRUD =====
function addSOP() {
  sopData.push({
    title:"新SOP",
    category: currentCategory,
    steps:[]
  });
  render();
}

function deleteSOP(i) {
  sopData.splice(i,1);
  render();
}

function addStep(i) {
  sopData[i].steps.push({ text:"", image:"" });
  render();
}

function deleteStep(i,j) {
  sopData[i].steps.splice(j,1);
  render();
}

// ===== 儲存 =====
async function save() {
  await fetch(API, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(sopData)
  });
  alert("✅ 已儲存");
}

load();
</script>

</body>
</html>
