<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body {
  font-family: Arial;
  background: #f5f6fa;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

a {
  text-decoration: none;
  color: blue;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  padding: 8px 15px;
  margin-top: 5px;
  cursor: pointer;
}

.step {
  border: 1px dashed #ccc;
  padding: 10px;
  margin-top: 10px;
}

img {
  max-width: 200px;
  margin-top: 5px;
  display: block;
}
</style>

</head>

<body>

<h1>🛠 SOP 管理</h1>
<a href="index.html">👉 回首頁</a>

<div id="list"></div>

<button onclick="addSOP()">➕ 新增 SOP</button>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

let sopData = [];

// =====================
// 載入資料
// =====================
async function load() {
  const res = await fetch(API);
  sopData = await res.json();
  render();
}

// =====================
// 畫面
// =====================
function render() {

  const div = document.getElementById("list");
  div.innerHTML = "";

  sopData.forEach((sop, i) => {

    let html = `
    <div class="card">
      <input value="${sop.title || ""}" onchange="updateTitle(${i}, this.value)">
      <input value="${sop.category || ""}" placeholder="分類" onchange="updateCategory(${i}, this.value)">
    `;

    sop.steps = sop.steps || [];

    sop.steps.forEach((step, j) => {
      html += `
        <div class="step">
          <input value="${step.text || ""}" onchange="updateStep(${i},${j},this.value)">
          
          <input class="imgUrl" value="${step.image || ""}" placeholder="圖片URL">

          <input type="file" onchange="uploadImage(this)">

          ${step.image ? `<img src="${step.image}">` : ""}

          <button onclick="deleteStep(${i},${j})">刪除步驟</button>
        </div>
      `;
    });

    html += `
      <button onclick="addStep(${i})">➕ 步驟</button>
      <button onclick="deleteSOP(${i})">🗑 刪除 SOP</button>
    </div>
    `;

    div.innerHTML += html;
  });
}

// =====================
// CRUD
// =====================
function addSOP() {
  sopData.push({ title: "新SOP", category: "", steps: [] });
  render();
}

function deleteSOP(i) {
  sopData.splice(i, 1);
  render();
}

function updateTitle(i, val) {
  sopData[i].title = val;
}

function updateCategory(i, val) {
  sopData[i].category = val;
}

function addStep(i) {
  sopData[i].steps.push({ text: "", image: "" });
  render();
}

function deleteStep(i, j) {
  sopData[i].steps.splice(j, 1);
  render();
}

function updateStep(i, j, val) {
  sopData[i].steps[j].text = val;
}

// =====================
// 💾 儲存
// =====================
async function save() {

  // 把 input URL 同步回資料
  document.querySelectorAll(".card").forEach((card, i) => {
    card.querySelectorAll(".step").forEach((stepDiv, j) => {
      const url = stepDiv.querySelector(".imgUrl").value;
      sopData[i].steps[j].image = url;
    });
  });

  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(sopData)
  });

  alert("✅ 已儲存");
}

// =====================
// 🖼 上傳圖片（修正版）
// =====================
async function uploadImage(input) {

  const file = input.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(API + "/upload", {
      method: "POST",
      body: formData
    });

    const text = await res.text();
    console.log("上傳回應:", text);

    const data = JSON.parse(text);

    const urlInput = input.parentElement.querySelector(".imgUrl");
    urlInput.value = data.url;

    // 🔥 即時顯示圖片
    let img = input.parentElement.querySelector("img");
    if (!img) {
      img = document.createElement("img");
      input.parentElement.appendChild(img);
    }
    img.src = data.url;

    alert("✅ 上傳成功");

  } catch (err) {
    alert("❌ 上傳失敗：" + err.message);
  }
}

// =====================
load();
</script>

<br>
<button onclick="save()">💾 儲存全部</button>

</body>
</html>
