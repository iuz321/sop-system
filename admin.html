<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #d0eaff, #e8f6ff);
  display:flex;
  justify-content:center;
  padding:30px;
  margin:0;
}

.container {
  width:800px;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1 {
  text-align:center;
}

.center {
  text-align:center;
}

button {
  margin:6px;
  padding:10px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#e3f2ff;
}

button:hover {
  background:#cde7ff;
}

.card {
  background:#f9fbff;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

input, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

img {
  max-width:200px;
  display:block;
  margin-top:10px;
  border-radius:6px;
}

.error {
  color:red;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="container" id="app"></div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";
const PASSWORD = "3686368"; // 🔐 自行修改

const categories = ["組立","電器","測機","整備","打樣"];

let data = {};
let currentCategory = null;
let currentIndex = null;

// ===== 登入檢查 =====
function checkLogin(){

  if(localStorage.getItem("login") === "true"){
    initApp();
    return;
  }

  let html = `
    <h1>🔐 管理登入</h1>

    <div class="center">
      <input type="password" id="pwd" placeholder="請輸入密碼">

      <div id="errorMsg" class="error"></div>

      <button onclick="login()">登入</button>
      <br><br>
      <button onclick="goHome()">🏠 返回首頁</button>
    </div>
  `;

  document.getElementById("app").innerHTML = html;
}

// ===== 登入 =====
function login(){
  const input = document.getElementById("pwd").value;

  if(input === PASSWORD){
    localStorage.setItem("login","true");
    initApp();
  }else{
    document.getElementById("errorMsg").innerText = "❌ 密碼錯誤";
  }
}

// ===== 回首頁 =====
function goHome(){
  location.href = "index.html";
}

// ===== 登出 =====
function logout(){
  localStorage.removeItem("login");
  location.reload();
}

// ===== 主系統 =====
async function initApp(){

  let html = `
    <h1>🛠 SOP 管理</h1>

    <div class="center">
      <a href="index.html">🏠 回首頁</a>
      <button onclick="logout()">登出</button>
    </div>

    <div id="main"></div>
  `;

  document.getElementById("app").innerHTML = html;

  await load();
}

// ===== 初始化 =====
async function load() {
  const res = await fetch(API);
  data = await res.json();

  categories.forEach(c=>{
    if(!data[c]) data[c]=[];
  });

  showCategories();
}

// ===== 分類 =====
function showCategories() {

  let html = "<h2 class='center'>選擇分類</h2>";

  html += "<div class='center'>";
  categories.forEach(c=>{
    html += `<button onclick="openCategory('${c}')">${c}</button>`;
  });
  html += "</div>";

  document.getElementById("main").innerHTML = html;
}

// ===== SOP列表 =====
function openCategory(cat) {

  currentCategory = cat;

  let html = `
    <h2 class="center">📂 ${cat}</h2>
    <div class="center">
      <button onclick="showCategories()">⬅ 返回分類</button>
    </div>
  `;

  data[cat].forEach((sop,i)=>{
    html += `
      <div class="card">
        <b>${sop.title || "未命名SOP"}</b><br><br>
        <button onclick="openSOP(${i})">✏ 編輯</button>
      </div>
    `;
  });

  html += `<div class="center"><button onclick="addSOP()">➕ 新增SOP</button></div>`;

  document.getElementById("main").innerHTML = html;
}

// ===== 新增SOP =====
function addSOP() {
  data[currentCategory].push({
    title:"新SOP",
    steps:[]
  });
  openCategory(currentCategory);
}

// ===== 編輯 =====
function openSOP(i) {

  currentIndex = i;
  const sop = data[currentCategory][i];
  if(!sop.steps) sop.steps = [];

  let html = `
    <h2 class="center">✏ 編輯 SOP</h2>

    <div class="center">
      <button onclick="openCategory('${currentCategory}')">⬅ 返回列表</button>
    </div>

    <p>標題：</p>
    <input value="${sop.title || ""}" 
      onchange="data['${currentCategory}'][${i}].title=this.value">

    <hr>

    <h3>📋 步驟列表</h3>
  `;

  sop.steps.forEach((step, index)=>{
    html += `
      <div class="card">
        <b>Step ${index+1}</b>

        <input value="${step.title || ""}" 
          onchange="data['${currentCategory}'][${i}].steps[${index}].title=this.value">

        <textarea 
          onchange="data['${currentCategory}'][${i}].steps[${index}].desc=this.value"
        >${step.desc || ""}</textarea>

        <input type="file" onchange="uploadImage(event, ${index})">

        <img id="img_${index}" src="${step.image || ""}" 
          style="${step.image ? '' : 'display:none;'}">

        <br>
        <button onclick="moveUp(${index})">⬆</button>
        <button onclick="moveDown(${index})">⬇</button>
        <button onclick="deleteStep(${index})">❌</button>
      </div>
    `;
  });

  html += `
    <div class="card">
      <h4>➕ 新增步驟</h4>

      <input id="newTitle" placeholder="標題">
      <textarea id="newDesc" placeholder="描述"></textarea>

      <input type="file" onchange="previewNewImage(event)">
      <img id="previewNew" style="display:none;">

      <button onclick="addStep()">新增</button>
    </div>

    <div class="center">
      <button onclick="save()">💾 儲存全部</button>
    </div>
  `;

  document.getElementById("main").innerHTML = html;
}

// ===== 圖片 =====
function uploadImage(event, index){
  const file = event.target.files[0];
  if(file.size > 500000){
    alert("圖片請小於500KB");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e){
    const base64 = e.target.result;
    data[currentCategory][currentIndex].steps[index].image = base64;

    const img = document.getElementById("img_"+index);
    img.src = base64;
    img.style.display = "block";
  };
  reader.readAsDataURL(file);
}

let newImageBase64 = "";

function previewNewImage(event){
  const file = event.target.files[0];
  if(file.size > 500000){
    alert("圖片請小於500KB");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e){
    newImageBase64 = e.target.result;

    const img = document.getElementById("previewNew");
    img.src = newImageBase64;
    img.style.display = "block";
  };
  reader.readAsDataURL(file);
}

// ===== CRUD =====
function addStep(){
  const title = document.getElementById("newTitle").value;
  const desc = document.getElementById("newDesc").value;

  if(!title){ alert("請輸入標題"); return; }

  data[currentCategory][currentIndex].steps.push({
    title, desc, image:newImageBase64
  });

  newImageBase64="";
  openSOP(currentIndex);
}

function deleteStep(index){
  data[currentCategory][currentIndex].steps.splice(index,1);
  openSOP(currentIndex);
}

function moveUp(index){
  if(index===0)return;
  let s=data[currentCategory][currentIndex].steps;
  [s[index-1],s[index]]=[s[index],s[index-1]];
  openSOP(currentIndex);
}

function moveDown(index){
  let s=data[currentCategory][currentIndex].steps;
  if(index===s.length-1)return;
  [s[index+1],s[index]]=[s[index],s[index+1]];
  openSOP(currentIndex);
}

// ===== 儲存 =====
async function save(){
  await fetch(API,{
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
  alert("✅ 已儲存");
  openCategory(currentCategory);
}

// ===== 啟動 =====
checkLogin();
</script>

</body>
</html>
