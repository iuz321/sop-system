<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f6fa; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
button { margin:5px; }
</style>
</head>

<body>

<h1>🛠 SOP 管理</h1>

<div id="categoryBar"></div>
<div id="list"></div>

<button onclick="save()">💾 儲存</button>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

const categories = ["組立","電器","測機","整備","打樣"];

let data = {};
let current = "組立";

// ===== 初始化 =====
async function load() {
  const res = await fetch(API);
  data = await res.json();

  // ⭐ 保證每個分類存在
  categories.forEach(c => {
    if (!data[c]) data[c] = [];
  });

  renderCategories();
  render();
}

// ===== 分類 =====
function renderCategories() {
  const div = document.getElementById("categoryBar");
  div.innerHTML = "";

  categories.forEach(c => {
    const btn = document.createElement("button");
    btn.innerText = c;
    btn.onclick = () => {
      current = c;
      render();
    };
    div.appendChild(btn);
  });
}

// ===== 畫面 =====
function render() {

  const div = document.getElementById("list");
  div.innerHTML = "";

  data[current].forEach((sop, i) => {

    div.innerHTML += `
      <div class="card">
        <input value="${sop.title || ""}" 
          onchange="data['${current}'][${i}].title=this.value">

        <button onclick="deleteSOP(${i})">刪除</button>
      </div>
    `;
  });

  div.innerHTML += `<button onclick="addSOP()">➕ 新增</button>`;
}

// ===== CRUD =====
function addSOP() {
  data[current].push({ title:"新SOP", steps:[] });
  render();
}

function deleteSOP(i) {
  data[current].splice(i,1);
  render();
}

// ===== 儲存 =====
async function save() {

  await fetch(API, {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ __replace: data })
  });

  alert("✅ 已儲存");
}

load();
</script>

</body>
</html>
