<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 管理</title>

<style>
body {
  margin:0;
  font-family: "Segoe UI", Arial;
  background:#f3f6f9;
}

/* ===== Layout ===== */
.layout {
  display:flex;
  height:100vh;
}

/* Sidebar */
.sidebar {
  width:220px;
  background:#1e293b;
  color:white;
  padding:20px;
}

.sidebar h2 {
  font-size:18px;
  margin-bottom:20px;
}

.sidebar button {
  width:100%;
  margin:6px 0;
  padding:10px;
  border:none;
  background:#334155;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.sidebar button:hover {
  background:#475569;
}

/* Main */
.main {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Header */
.header {
  height:60px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

.header .title {
  font-weight:bold;
}

.header button {
  padding:6px 12px;
  border:none;
  background:#e2e8f0;
  border-radius:6px;
  cursor:pointer;
}

/* Content */
.content {
  padding:20px;
  overflow:auto;
}

/* Card */
.card {
  background:white;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

/* Inputs */
input, textarea {
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

/* Buttons */
.btn {
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.btn-blue {
  background:#2563eb;
  color:white;
}

.btn-red {
  background:#ef4444;
  color:white;
}

img {
  max-width:200px;
  margin-top:10px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>🛠 SOP 系統</h2>
    <div id="sidebarMenu"></div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Header -->
    <div class="header">
      <div class="title">SOP 管理後台</div>
      <div>
        <button onclick="location.href='index.html'">🏠 首頁</button>
        <button onclick="logout()">登出</button>
      </div>
    </div>

    <!-- Content -->
    <div class="content" id="app"></div>

  </div>

</div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";
const PASSWORD = "1234";
const categories = ["組立","電氣","測機","整備","打樣"];

let data={}, currentCategory=null, currentIndex=null;
let newImageUrl="";

// ===== Sidebar =====
function renderSidebar(){
  let html="";
  categories.forEach(c=>{
    html += `<button onclick="openCategory('${c}')">${c}</button>`;
  });
  sidebarMenu.innerHTML = html;
}

// ===== 登入 =====
function checkLogin(){
  if(localStorage.getItem("login")==="true"){
    renderSidebar();
    initApp();
    return;
  }
  app.innerHTML=`
    <div class="card">
      <h2>登入</h2>
      <input type="password" id="pwd">
      <button class="btn btn-blue" onclick="login()">登入</button>
    </div>`;
}

function login(){
  if(pwd.value===PASSWORD){
    localStorage.setItem("login","true");
    location.reload();
  }else alert("錯誤");
}

function logout(){
  localStorage.removeItem("login");
  location.reload();
}

// ===== 主系統 =====
async function initApp(){
  await load();
}

// ===== 載入 =====
async function load(){
  const res=await fetch(API);
  data=await res.json();
  categories.forEach(c=>{ if(!data[c]) data[c]=[]; });
  showCategories();
}

// ===== 顯示分類 =====
function showCategories(){
  app.innerHTML="<div class='card'>請選擇左側分類</div>";
}

// ===== SOP列表 =====
function openCategory(cat){
  currentCategory=cat;

  let html=`<h2>${cat}</h2>`;

  data[cat].forEach((s,i)=>{
    html+=`
      <div class="card">
        <b>${s.title}</b><br><br>
        <button class="btn btn-blue" onclick="openSOP(${i})">編輯</button>
        <button class="btn btn-red" onclick="deleteSOP(${i})">刪除</button>
      </div>`;
  });

  html+=`<button class="btn btn-blue" onclick="addSOP()">新增SOP</button>`;

  app.innerHTML=html;
}

function addSOP(){
  data[currentCategory].push({title:"新SOP",steps:[]});
  openCategory(currentCategory);
}

async function deleteSOP(i){
  if(!confirm("確定刪除？")) return;
  data[currentCategory].splice(i,1);
  await saveData();
  openCategory(currentCategory);
}

// ===== 編輯 =====
function openSOP(i){
  currentIndex=i;
  const sop=data[currentCategory][i];

  let html=`<h2>編輯 ${sop.title}</h2>`;

  sop.steps.forEach((st,idx)=>{
    html+=`
      <div class="card">
        <input value="${st.title}" onchange="data[currentCategory][${i}].steps[${idx}].title=this.value">
        <textarea onchange="data[currentCategory][${i}].steps[${idx}].desc=this.value">${st.desc}</textarea>
      </div>`;
  });

  html+=`<button class="btn btn-blue" onclick="save()">儲存</button>`;

  app.innerHTML=html;
}

// ===== 儲存 =====
async function save(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });
  alert("已儲存");
  openCategory(currentCategory);
}

async function saveData(){
  await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });
}

checkLogin();
</script>

</body>
</html>
