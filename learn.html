<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 學習</title>

<style>
body { font-family: Arial; padding:20px; background:#f9f9f9; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
img { max-width:300px; margin-top:5px; }
</style>
</head>

<body>

<h1>📖 SOP 學習</h1>
<a href="index.html">👉 回首頁</a>

<div id="list"></div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

async function load() {

  const res = await fetch(API);
  const data = await res.json();

  const div = document.getElementById("list");

  data.forEach(sop => {

    let html = `<div class="card"><h2>${sop.title}</h2>`;

    (sop.steps || []).forEach(step => {
      html += `
        <p>${step.text || ""}</p>
        ${step.image ? `<img src="${step.image}">` : ""}
      `;
    });

    html += `</div>`;

    div.innerHTML += html;
  });
}

load();
</script>

</body>
</html>
