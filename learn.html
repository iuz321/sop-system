<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 閱讀模式</title>

<style>
body {
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
  padding:20px;
}

h1 { font-size:32px; }
h2 { font-size:26px; }
p { font-size:22px; }

img {
  max-width:90%;
  margin-top:20px;
  border-radius:10px;
}

button {
  padding:12px 20px;
  margin:10px;
  font-size:18px;
}
</style>
</head>

<body>

<div id="app">載入中...</div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

let data = {};
let currentCategory = "";
let currentIndex = 0;
let stepIndex = 0;

// ===== 讀URL參數 =====
function getParam(name){
  return new URLSearchParams(location.search).get(name);
}

// ===== 初始化 =====
async function load(){

  currentCategory = getParam("cat");
  currentIndex = parseInt(getParam("id") || 0);

  const res = await fetch(API);
  data = await res.json();

  showStep();
}

// ===== 顯示步驟 =====
function showStep(){

  const sop = data[currentCategory][currentIndex];
  const step = sop.steps[stepIndex];

  let html = `
    <h1>${sop.title}</h1>
    <h2>Step ${stepIndex+1}</h2>

    <p>${step.title || ""}</p>
    <p>${step.desc || ""}</p>
  `;

  if(step.image){
    html += `<img src="${step.image}">`;
  }

  html += `
    <br><br>
    <button onclick="prev()">⬅ 上一步</button>
    <button onclick="next()">➡ 下一步</button>
    <br><br>
    <button onclick="goHome()">❌ 離開</button>
  `;

  document.getElementById("app").innerHTML = html;
}

// ===== 控制 =====
function next(){
  const sop = data[currentCategory][currentIndex];
  if(stepIndex < sop.steps.length-1){
    stepIndex++;
    showStep();
  }
}

function prev(){
  if(stepIndex > 0){
    stepIndex--;
    showStep();
  }
}

function goHome(){
  location.href = "index.html";
}

// ===== 啟動 =====
load();
</script>

</body>
</html>
