<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 學習系統</title>

<style>
body {
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

button {
  padding:10px 16px;
  margin:5px;
  font-size:16px;
}

.card {
  background:#222;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

.viewer {
  text-align:center;
}

.viewer h1 { font-size:30px; }
.viewer h2 { font-size:24px; }
.viewer p { font-size:20px; }

.viewer img {
  max-width:90%;
  margin-top:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>📖 SOP 學習</h1>
<button onclick="goHome()">🏠 回首頁</button>

<div id="app">載入中...</div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";
const categories = ["組立","電器","測機","整備","打樣"];

let data = {};
let currentCategory = null;
let currentIndex = null;
let stepIndex = 0;

// ===== URL參數 =====
function getParam(name){
  return new URLSearchParams(location.search).get(name);
}

// ===== 初始化 =====
async function load(){

  const res = await fetch(API);
  data = await res.json();

  categories.forEach(c=>{
    if(!data[c]) data[c]=[];
  });

  const cat = getParam("cat");
  const id = getParam("id");

  if(cat && id !== null){
    currentCategory = cat;
    currentIndex = parseInt(id);
    stepIndex = 0;
    showStep();
  }else{
    showCategories();
  }
}

// ===== 顯示分類 =====
function showCategories(){

  let html = "<h2>選擇分類</h2>";

  categories.forEach(c=>{
    html += `<button onclick="openCategory('${c}')">${c}</button>`;
  });

  document.getElementById("app").innerHTML = html;
}

// ===== 顯示SOP =====
function openCategory(cat){

  currentCategory = cat;

  let html = `
    <h2>📂 ${cat}</h2>
    <button onclick="showCategories()">⬅ 返回分類</button>
  `;

  data[cat].forEach((sop,i)=>{
    html += `
      <div class="card">
        <b>${sop.title || "未命名SOP"}</b><br><br>
        <button onclick="startViewer(${i})">📖 開始</button>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;
}

// ===== 進入閱讀 =====
function startViewer(i){
  currentIndex = i;
  stepIndex = 0;
  showStep();
}

// ===== 顯示步驟 =====
function showStep(){

  const sop = data[currentCategory][currentIndex];
  const step = sop.steps[stepIndex];

  let html = `
    <div class="viewer">
      <h1>${sop.title}</h1>
      <h2>Step ${stepIndex+1}</h2>

      <p>${step.title || ""}</p>
      <p>${step.desc || ""}</p>
  `;

  if(step.image){
    html += `<img src="${step.image}">`;
  }

  html += `
      <br><br>
      <button onclick="prev()">⬅ 上一步</button>
      <button onclick="next()">➡ 下一步</button>

      <br><br>
      <button onclick="openCategory('${currentCategory}')">📂 回SOP列表</button>
      <button onclick="showCategories()">🏠 回分類</button>
    </div>
  `;

  document.getElementById("app").innerHTML = html;
}

// ===== 控制 =====
function next(){
  const sop = data[currentCategory][currentIndex];
  if(stepIndex < sop.steps.length-1){
    stepIndex++;
    showStep();
  }
}

function prev(){
  if(stepIndex > 0){
    stepIndex--;
    showStep();
  }
}

// ===== 回首頁 =====
function goHome(){
  location.href = "index.html";
}

// ===== 啟動 =====
load();
</script>

</body>
</html>
