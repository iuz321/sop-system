<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 學習</title>

<style>
body { font-family: Arial; padding:20px; }
.card { background:white; padding:15px; margin-bottom:15px; }
button { margin:5px; }
</style>
</head>

<body>

<h1>📖 SOP 學習</h1>

<div id="categoryBar"></div>
<div id="list"></div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

const categories = ["組立","電器","測機","整備","打樣"];

let data = {};
let current = "組立";

async function load() {
  const res = await fetch(API);
  data = await res.json();

  categories.forEach(c => {
    if (!data[c]) data[c] = [];
  });

  renderCategories();
  render();
}

function renderCategories() {

  const div = document.getElementById("categoryBar");

  categories.forEach(c => {
    const btn = document.createElement("button");
    btn.innerText = c;
    btn.onclick = () => {
      current = c;
      render();
    };
    div.appendChild(btn);
  });
}

function render() {

  const div = document.getElementById("list");
  div.innerHTML = "";

  data[current].forEach(sop => {
    div.innerHTML += `
      <div class="card">
        <h2>${sop.title}</h2>
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
