<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SOP 學習</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:20px; }
.card { background:white; padding:15px; margin:10px 0; border-radius:10px; }
img { max-width:100%; }
</style>
</head>

<body>

<h1>SOP 學習系統</h1>
<a href="index.html">👉 回首頁</a>

<div id="list"></div>

<script>
const API = "https://black-scene-3fcf.fu-jinmin.workers.dev";

async function loadData() {
  const res = await fetch(API);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {

    let html = `<h2>${item.title}</h2>
                <p>📂 ${item.category || "未分類"}</p>`;

    item.steps?.forEach((step, i) => {
      html += `
        <p><b>Step ${i+1}</b></p>
        <p>${step.text}</p>
        ${step.img ? `<img src="${step.img}">` : ""}
      `;
    });

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = html;

    list.appendChild(div);
  });
}

loadData();
</script>

</body>
</html>
